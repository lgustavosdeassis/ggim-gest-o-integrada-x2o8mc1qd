<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <g transform="translate(250, 230)">
    <!-- Hexagon Outer Border -->
    <polygon points="0,-150 129.9,-75 129.9,75 0,150 -129.9,75 -129.9,-75" fill="#111827" stroke="#ea580c" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- Top Section (Yellow) -->
    <polygon points="0,0 -120,-69.28 0,-138.56 120,-69.28" fill="#eab308" stroke="#111827" stroke-width="6" stroke-linejoin="round"/>
    
    <!-- Left Section (Blue) -->
    <polygon points="0,0 -120,-69.28 -120,69.28 0,138.56" fill="#0ea5e9" stroke="#111827" stroke-width="6" stroke-linejoin="round"/>
    
    <!-- Right Section (Green) -->
    <polygon points="0,0 120,-69.28 120,69.28 0,138.56" fill="#84cc16" stroke="#111827" stroke-width="6" stroke-linejoin="round"/>

    <!-- Globe in upper area -->
    <g transform="translate(0, -60)">
      <circle cx="0" cy="0" r="40" fill="#f8fafc" stroke="#1e40af" stroke-width="5"/>
      <path d="M-20,-20 Q-10,-30 10,-20 T25,-10 Q35,10 15,20 T-20,0 Z" fill="#1e40af"/>
      <path d="M-30,10 Q-20,20 -10,10 Z" fill="#1e40af"/>
    </g>

    <!-- Figures in lower area -->
    <g transform="translate(0, 45)">
      <circle cx="-50" cy="5" r="22" fill="#111827"/>
      <path d="M-85,65 C-85,30 -15,30 -15,65" fill="#111827"/>
      
      <circle cx="50" cy="5" r="22" fill="#111827"/>
      <path d="M15,65 C15,30 85,30 85,65" fill="#111827"/>
      
      <circle cx="0" cy="-15" r="28" fill="#111827"/>
      <path d="M-45,75 C-45,15 45,15 45,75" fill="#111827"/>
      <path d="M-45,75 C-45,15 45,15 45,75" fill="none" stroke="#0ea5e9" stroke-width="3" opacity="0.8"/>
    </g>
  </g>
  
  <!-- Text around hexagon -->
  <path id="text-arc-top" d="M 50,250 A 200,200 0 0,1 450,250" fill="none"/>
  <text font-family="Arial, sans-serif" font-weight="900" font-size="24" fill="#94a3b8" letter-spacing="3">
    <textPath href="#text-arc-top" startOffset="50%" text-anchor="middle">
      GABINETE DE GESTÃO INTEGRADA MUNICIPAL
    </textPath>
  </text>
  
  <path id="text-arc-bottom" d="M 120,430 L 380,430" fill="none"/>
  <text font-family="Arial, sans-serif" font-weight="900" font-size="32" fill="#94a3b8" letter-spacing="6">
    <textPath href="#text-arc-bottom" startOffset="50%" text-anchor="middle">
      FOZ DO IGUAÇU
    </textPath>
  </text>
</svg>
